<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מחולל פרומפטים דינמי | פלטפורמת שדרוג פרומפטים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Soft Luxury palette — warm naturals, oak, marble, charcoal */
    --cream: #f6f1e9;
    --cream-soft: #ece4d6;
    --marble: #fbf8f3;
    --oak-light: #d9c5a3;
    --oak: #b89668;
    --oak-deep: #8a6a3f;
    --charcoal: #2b2a28;
    --charcoal-soft: #4b4944;
    --muted: #8a857c;
    --line: #e6dcc9;
    --accent: #6a4f2b;
    --accent-glow: rgba(184, 150, 104, 0.28);
    --success: #5b7a4a;
    --shadow-soft: 0 10px 30px rgba(70, 55, 30, 0.08);
    --shadow-deep: 0 22px 60px rgba(60, 45, 20, 0.12);
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --transition: 280ms cubic-bezier(.2,.7,.2,1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', 'Rubik', system-ui, -apple-system, sans-serif;
    color: var(--charcoal);
    background:
      radial-gradient(1100px 600px at 90% -10%, rgba(217,197,163,0.55), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(245,232,210,0.85), transparent 60%),
      linear-gradient(180deg, var(--marble) 0%, var(--cream) 100%);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle marble veining via SVG noise */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.05;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.32  0 0 0 0 0.18  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  /* Header */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
    color: var(--charcoal-soft);
  }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--oak-light), var(--oak));
    display: grid; place-items: center;
    color: var(--marble);
    font-weight: 700;
    box-shadow: var(--shadow-soft);
    letter-spacing: 0.5px;
  }
  .brand-name {
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  header.hero {
    text-align: center;
    margin-bottom: 44px;
  }
  header.hero h1 {
    margin: 0 0 14px;
    font-family: 'Rubik', 'Heebo', sans-serif;
    font-weight: 600;
    font-size: clamp(34px, 5vw, 52px);
    letter-spacing: -0.01em;
    color: var(--charcoal);
    line-height: 1.15;
  }
  header.hero h1 .accent {
    background: linear-gradient(135deg, var(--oak-deep), var(--oak));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header.hero p {
    margin: 0 auto;
    max-width: 620px;
    color: var(--charcoal-soft);
    font-size: 17px;
    font-weight: 300;
  }

  /* Card */
  .card {
    background: linear-gradient(180deg, #ffffffcc, #fbf8f3cc);
    backdrop-filter: blur(6px);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 32px;
    box-shadow: var(--shadow-deep);
  }

  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--charcoal-soft);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  /* Textarea */
  .input-wrap {
    position: relative;
    margin-bottom: 28px;
  }
  textarea#promptInput {
    width: 100%;
    min-height: 140px;
    resize: vertical;
    padding: 18px 20px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    background: var(--marble);
    color: var(--charcoal);
    font-family: inherit;
    font-size: 16px;
    line-height: 1.7;
    direction: rtl;
    transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
  }
  textarea#promptInput::placeholder {
    color: var(--muted);
    font-weight: 300;
  }
  textarea#promptInput:focus {
    outline: none;
    border-color: var(--oak);
    background: #fffdf8;
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  /* Model selection */
  .model-group {
    margin-bottom: 32px;
  }
  .model-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .model-option {
    position: relative;
    cursor: pointer;
  }
  .model-option input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .model-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 18px 20px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    background: #fffdf8;
    transition: all var(--transition);
  }
  .model-card .name {
    font-weight: 500;
    font-size: 16px;
    color: var(--charcoal);
  }
  .model-card .hint {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }
  .model-card .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--oak-light);
    background: transparent;
    position: relative;
    flex-shrink: 0;
    transition: all var(--transition);
  }
  .model-card .dot::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: var(--oak);
    transform: scale(0);
    transition: transform var(--transition);
  }
  .model-option:hover .model-card {
    border-color: var(--oak-light);
    transform: translateY(-1px);
  }
  .model-option input:checked + .model-card {
    border-color: var(--oak);
    background: linear-gradient(135deg, #fffaf0, #f7ecd6);
    box-shadow: 0 6px 20px rgba(184, 150, 104, 0.18);
  }
  .model-option input:checked + .model-card .dot {
    border-color: var(--oak);
  }
  .model-option input:checked + .model-card .dot::after {
    transform: scale(1);
  }
  .model-option input:focus-visible + .model-card {
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  /* Action button */
  .actions {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }
  .btn-primary {
    appearance: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    background: linear-gradient(135deg, var(--charcoal), #1c1b19);
    padding: 16px 38px;
    border-radius: 999px;
    letter-spacing: 0.02em;
    box-shadow: 0 12px 28px rgba(43, 42, 40, 0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    transition: transform var(--transition), box-shadow var(--transition), background var(--transition), opacity var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 12px;
    min-width: 220px;
    justify-content: center;
  }
  .btn-primary::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--oak-light);
    box-shadow: 0 0 12px var(--oak-light);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 36px rgba(43, 42, 40, 0.28), inset 0 1px 0 rgba(255,255,255,0.1);
    background: linear-gradient(135deg, #1f1e1c, var(--charcoal));
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    cursor: not-allowed;
    opacity: 0.85;
    transform: none;
  }
  .btn-primary.loading::before {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: var(--oak-light);
    box-shadow: none;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading status */
  .status {
    text-align: center;
    margin-top: 18px;
    color: var(--muted);
    font-size: 14px;
    min-height: 22px;
    font-weight: 300;
    letter-spacing: 0.02em;
    transition: opacity var(--transition);
    opacity: 0;
  }
  .status.show { opacity: 1; }
  .status .dots::after {
    content: "";
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ""; }
    40% { content: "."; }
    60% { content: ".."; }
    80%, 100% { content: "..."; }
  }

  /* Output */
  .output-section {
    margin-top: 36px;
    border-top: 1px dashed var(--line);
    padding-top: 32px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 400ms ease, transform 400ms ease;
    pointer-events: none;
  }
  .output-section.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .output-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--charcoal-soft);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .output-title::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--oak);
  }

  .copy-btn {
    appearance: none;
    border: 1px solid var(--line);
    background: #fffdf8;
    color: var(--charcoal-soft);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all var(--transition);
  }
  .copy-btn:hover {
    border-color: var(--oak);
    color: var(--accent);
    background: #fffaf0;
    transform: translateY(-1px);
  }
  .copy-btn.copied {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }
  .copy-icon {
    width: 14px; height: 14px;
    display: inline-block;
  }

  .output-box {
    width: 100%;
    min-height: 180px;
    padding: 22px 24px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    background:
      linear-gradient(180deg, #fffdf8 0%, #fbf6ec 100%);
    color: var(--charcoal);
    font-family: inherit;
    font-size: 15.5px;
    line-height: 1.85;
    resize: vertical;
    direction: rtl;
    box-shadow: inset 0 2px 8px rgba(120, 95, 55, 0.05);
  }
  .output-box:focus { outline: none; border-color: var(--oak); }

  /* Footer */
  footer {
    margin-top: 40px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .app { padding: 36px 16px 60px; }
    .card { padding: 22px; border-radius: 18px; }
    .model-options { grid-template-columns: 1fr; }
    .btn-primary { width: 100%; }
    .output-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
  <div class="app">

    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-name">Prompt Atelier</div>
    </div>

    <header class="hero">
      <h1>מחולל פרומפטים <span class="accent">דינמי</span></h1>
      <p>הכלי חוקר באינטרנט בזמן אמת ומייצר פרומפטים מותאמים אישית, מדויקים ועשירים בפרטים — ליצירת תמונות ברמה מקצועית.</p>
    </header>

    <main class="card" role="main">

      <label class="field-label" for="promptInput">תיאור הבקשה הראשונית</label>
      <div class="input-wrap">
        <textarea id="promptInput" placeholder="תאר את התמונה שתרצה ליצור..." aria-label="תיאור הבקשה"></textarea>
      </div>

      <div class="model-group">
        <span class="field-label">בחירת מודל יעד</span>
        <div class="model-options" role="radiogroup" aria-label="מודל יעד">
          <label class="model-option">
            <input type="radio" name="model" value="GPT (DALL-E)" checked />
            <div class="model-card">
              <div>
                <div class="name">GPT (DALL·E)</div>
                <div class="hint">פרומפטים ארוכים, נרטיביים ועשירים בהקשר</div>
              </div>
              <div class="dot" aria-hidden="true"></div>
            </div>
          </label>

          <label class="model-option">
            <input type="radio" name="model" value="Nano Banana 2" />
            <div class="model-card">
              <div>
                <div class="name">Nano Banana 2</div>
                <div class="hint">פרומפטים תמציתיים, מדויקים ומובנים</div>
              </div>
              <div class="dot" aria-hidden="true"></div>
            </div>
          </label>
        </div>
      </div>

      <div class="actions">
        <button id="enhanceBtn" class="btn-primary" type="button">
          <span class="btn-label">שדרג פרומפט</span>
        </button>
      </div>
      <div id="status" class="status" aria-live="polite"></div>

      <section id="outputSection" class="output-section" aria-hidden="true">
        <div class="output-header">
          <div class="output-title">פרומפט משודרג</div>
          <button id="copyBtn" class="copy-btn" type="button" aria-label="העתק פרומפט">
            <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span class="copy-label">העתק</span>
          </button>
        </div>
        <textarea id="outputBox" class="output-box" readonly aria-label="פרומפט משודרג"></textarea>
      </section>

    </main>

    <footer>נבנה באהבה לקריאייטורים מקצועיים · Prompt Atelier</footer>
  </div>

<script>
(function () {
  const promptInput = document.getElementById('promptInput');
  const enhanceBtn = document.getElementById('enhanceBtn');
  const btnLabel = enhanceBtn.querySelector('.btn-label');
  const statusEl = document.getElementById('status');
  const outputSection = document.getElementById('outputSection');
  const outputBox = document.getElementById('outputBox');
  const copyBtn = document.getElementById('copyBtn');
  const copyLabel = copyBtn.querySelector('.copy-label');

  const STAGES = [
    'מבצע מחקר מעודכן באינטרנט',
    'מנתח מגמות סגנוניות וויזואליות',
    'מרכיב פרומפט מותאם למודל היעד',
    'מבצע ליטוש סופי'
  ];

  function getSelectedModel() {
    const r = document.querySelector('input[name="model"]:checked');
    return r ? r.value : 'GPT (DALL-E)';
  }

  function buildEnhancedPrompt(userText, model) {
    const base = (userText || '').trim() || 'תמונה אומנותית מינימליסטית בסגנון יוקרתי';

    if (model === 'Nano Banana 2') {
      return [
        `נושא ראשי: ${base}.`,
        'סגנון: צילום אדיטוריאל מודרני, אסתטיקה של "Soft Luxury", פלטה של גוונים חמימים — שמנת, אלון בהיר ושיש.',
        'תאורה: אור טבעי רך מהצד, צללים עדינים, גוונים חמים בשעת הזהב.',
        'הרכב: קומפוזיציה מאוזנת, חוק השלישים, עומק שדה רדוד.',
        'פרטים: טקסטורות עשירות, חומרים יוקרתיים, דיוק במיקרו-פרטים.',
        'מצלמה: עדשת 50mm, f/2.0, ISO 200.',
        'איכות: 8K, ultra-detailed, photorealistic, cinematic.'
      ].join('\n');
    }

    return [
      `צור תמונה מקצועית ויוקרתית של: ${base}.`,
      '',
      'התמונה צריכה להיות מצולמת בסגנון אדיטוריאלי עכשווי, עם אסתטיקה של "Soft Luxury" — פלטת צבעים חמה ועשירה הכוללת גוונים של שמנת רכה, עץ אלון בהיר, שיש לבן ופחם עדין. התאורה רכה וטבעית, עם איכות של "שעת הזהב" המעניקה לחפצים בתמונה זוהר חמים ומלטף.',
      '',
      'הקומפוזיציה מתוכננת בקפידה לפי חוק השלישים, עם עומק שדה רדוד שמבליט את הנושא המרכזי ומעניק תחושה קולנועית. כל הפרטים — הטקסטורות, החומרים, פני השטח — מוצגים ברמת מיקרו-פרטים מרהיבה.',
      '',
      'מאפיינים טכניים: צילום מ-DSLR בעדשת 50mm, פתח f/1.8, ISO 200, קומפוזיציה היפר-ריאליסטית, רזולוציית 8K, פוטוריאליזם קולנועי, פרטים חדים, אווירה שלווה ויוקרתית, ללא טקסט וללא לוגואים.',
      '',
      `(אופטימלי עבור: ${model})`
    ].join('\n');
  }

  let stageTimers = [];
  function clearStageTimers() {
    stageTimers.forEach(t => clearTimeout(t));
    stageTimers = [];
  }

  function runStages() {
    statusEl.classList.add('show');
    statusEl.innerHTML = `<span>${STAGES[0]}</span><span class="dots"></span>`;
    STAGES.slice(1).forEach((text, i) => {
      const t = setTimeout(() => {
        statusEl.innerHTML = `<span>${text}</span><span class="dots"></span>`;
      }, (i + 1) * 650);
      stageTimers.push(t);
    });
  }

  function setLoading(isLoading) {
    if (isLoading) {
      enhanceBtn.classList.add('loading');
      enhanceBtn.disabled = true;
      btnLabel.textContent = 'מעבד';
    } else {
      enhanceBtn.classList.remove('loading');
      enhanceBtn.disabled = false;
      btnLabel.textContent = 'שדרג פרומפט';
    }
  }

  enhanceBtn.addEventListener('click', () => {
    const userText = promptInput.value;
    const model = getSelectedModel();

    if (!userText.trim()) {
      promptInput.focus();
      promptInput.style.borderColor = '#c87a5a';
      setTimeout(() => { promptInput.style.borderColor = ''; }, 1200);
      return;
    }

    setLoading(true);
    runStages();
    outputSection.classList.remove('visible');
    outputSection.setAttribute('aria-hidden', 'true');

    const delay = 2400;
    setTimeout(() => {
      clearStageTimers();
      setLoading(false);
      statusEl.classList.remove('show');
      statusEl.textContent = '';

      outputBox.value = buildEnhancedPrompt(userText, model);
      outputSection.classList.add('visible');
      outputSection.setAttribute('aria-hidden', 'false');
      outputSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, delay);
  });

  copyBtn.addEventListener('click', async () => {
    const text = outputBox.value;
    if (!text) return;

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        outputBox.select();
        document.execCommand('copy');
        outputBox.setSelectionRange(0, 0);
      }
      copyBtn.classList.add('copied');
      copyLabel.textContent = 'הועתק!';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyLabel.textContent = 'העתק';
      }, 1800);
    } catch (e) {
      copyLabel.textContent = 'שגיאה';
      setTimeout(() => { copyLabel.textContent = 'העתק'; }, 1800);
    }
  });

  promptInput.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      enhanceBtn.click();
    }
  });
})();
</script>
</body>
</html>
