<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>סימולציית מערכת השמש - תלת מימד</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; color: #fff; }
        #canvas-container { position: fixed; inset: 0; }
        #info {
            position: fixed; top: 16px; right: 16px; padding: 14px 18px;
            background: rgba(10, 12, 28, 0.72); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px;
            max-width: 280px; font-size: 14px; line-height: 1.6;
        }
        #info h1 { font-size: 17px; margin-bottom: 8px; color: #ffd76b; }
        #info .hint { font-size: 12px; opacity: 0.75; margin-top: 6px; }
        #controls {
            position: fixed; bottom: 16px; right: 16px; padding: 14px 18px;
            background: rgba(10, 12, 28, 0.72); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px;
            display: flex; flex-direction: column; gap: 10px; min-width: 240px;
        }
        #controls label { font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        #controls input[type="range"] { flex: 1; }
        #controls button {
            background: rgba(255, 215, 107, 0.15); color: #ffd76b;
            border: 1px solid rgba(255, 215, 107, 0.4); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px;
        }
        #controls button:hover { background: rgba(255, 215, 107, 0.25); }
        #planet-tooltip {
            position: fixed; pointer-events: none; padding: 6px 10px;
            background: rgba(10, 12, 28, 0.9); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.15s;
            transform: translate(-50%, -130%); white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="info">
        <h1>☀️ מערכת השמש</h1>
        <div>סימולציה תלת-ממדית של 8 כוכבי הלכת המקיפים את השמש.</div>
        <div class="hint">
            • גרירה: סיבוב המצלמה<br>
            • גלגלת: זום<br>
            • לחיצה ימנית + גרירה: הזזה<br>
            • ריחוף מעל כוכב: שם
        </div>
    </div>

    <div id="controls">
        <label>מהירות סיבוב <span id="speed-value">1.0×</span></label>
        <input type="range" id="speed" min="0" max="5" step="0.1" value="1" />
        <label>
            <input type="checkbox" id="orbits" checked />
            הצג מסלולים
        </label>
        <label>
            <input type="checkbox" id="labels" checked />
            הצג שמות
        </label>
        <button id="reset-camera">איפוס מצלמה</button>
    </div>

    <div id="planet-tooltip"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        const initialCameraPos = new THREE.Vector3(0, 80, 180);
        camera.position.copy(initialCameraPos);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 15;
        controls.maxDistance = 800;

        // --- Starfield background ---
        const starsGeometry = new THREE.BufferGeometry();
        const starCount = 6000;
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const r = 1500 + Math.random() * 1500;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i * 3 + 2] = r * Math.cos(phi);
            const tint = 0.7 + Math.random() * 0.3;
            starColors[i * 3]     = tint;
            starColors[i * 3 + 1] = tint;
            starColors[i * 3 + 2] = tint * (0.85 + Math.random() * 0.15);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        const stars = new THREE.Points(
            starsGeometry,
            new THREE.PointsMaterial({ size: 1.4, vertexColors: true, sizeAttenuation: true })
        );
        scene.add(stars);

        // --- Sun ---
        const sunGroup = new THREE.Group();
        const sun = new THREE.Mesh(
            new THREE.SphereGeometry(8, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xffcc33 })
        );
        sunGroup.add(sun);

        // Sun glow (sprite halo)
        const glowCanvas = document.createElement('canvas');
        glowCanvas.width = glowCanvas.height = 256;
        const gctx = glowCanvas.getContext('2d');
        const grad = gctx.createRadialGradient(128, 128, 10, 128, 128, 128);
        grad.addColorStop(0, 'rgba(255,220,120,0.9)');
        grad.addColorStop(0.3, 'rgba(255,170,60,0.4)');
        grad.addColorStop(1, 'rgba(255,140,40,0)');
        gctx.fillStyle = grad;
        gctx.fillRect(0, 0, 256, 256);
        const glowTexture = new THREE.CanvasTexture(glowCanvas);
        const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTexture, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
        glow.scale.set(36, 36, 1);
        sunGroup.add(glow);
        scene.add(sunGroup);

        const sunLight = new THREE.PointLight(0xffeecc, 3, 0, 1.5);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x222233, 0.5));

        // --- Planets data ---
        // distances/sizes/speeds are stylized for visibility, not to scale.
        const planetData = [
            { name: 'כוכב חמה',  size: 0.9,  distance: 14,  color: 0xa6a6a6, speed: 1.60, tilt: 0.03 },
            { name: 'נוגה',      size: 1.6,  distance: 20,  color: 0xe8c07a, speed: 1.18, tilt: 0.05 },
            { name: 'כדור הארץ', size: 1.7,  distance: 28,  color: 0x3a8fd1, speed: 1.00, tilt: 0.41 },
            { name: 'מאדים',     size: 1.2,  distance: 36,  color: 0xc1440e, speed: 0.81, tilt: 0.44 },
            { name: 'צדק',       size: 4.5,  distance: 56,  color: 0xd9a36b, speed: 0.44, tilt: 0.05, bands: true },
            { name: 'שבתאי',     size: 3.8,  distance: 78,  color: 0xe6cf95, speed: 0.32, tilt: 0.47, rings: true },
            { name: 'אורנוס',    size: 2.6,  distance: 98,  color: 0x9fdcdf, speed: 0.23, tilt: 1.71 },
            { name: 'נפטון',     size: 2.5,  distance: 118, color: 0x4062bb, speed: 0.18, tilt: 0.49 }
        ];

        const planets = [];
        const orbitRings = [];
        const labels = [];

        function makeOrbitRing(distance) {
            const segments = 256;
            const positions = new Float32Array((segments + 1) * 3);
            for (let i = 0; i <= segments; i++) {
                const a = (i / segments) * Math.PI * 2;
                positions[i * 3]     = Math.cos(a) * distance;
                positions[i * 3 + 1] = 0;
                positions[i * 3 + 2] = Math.sin(a) * distance;
            }
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            return new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0x445577, transparent: true, opacity: 0.45 }));
        }

        function makeLabel(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = 'bold 28px Segoe UI, Tahoma, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.shadowColor = 'rgba(0,0,0,0.85)';
            ctx.shadowBlur = 6;
            ctx.fillText(text, 128, 32);
            const tex = new THREE.CanvasTexture(canvas);
            tex.minFilter = THREE.LinearFilter;
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
            sprite.scale.set(8, 2, 1);
            sprite.renderOrder = 999;
            return sprite;
        }

        planetData.forEach((p, idx) => {
            const group = new THREE.Group();
            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(p.size, 48, 48),
                new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.85, metalness: 0.05 })
            );
            mesh.userData.name = p.name;
            mesh.rotation.z = p.tilt;
            group.add(mesh);

            if (p.rings) {
                const ringGeom = new THREE.RingGeometry(p.size * 1.4, p.size * 2.3, 96);
                // Tilt UVs so the ring appears as a band
                const pos = ringGeom.attributes.position;
                const uv = ringGeom.attributes.uv;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i), y = pos.getY(i);
                    const r = Math.sqrt(x * x + y * y);
                    uv.setXY(i, (r - p.size * 1.4) / (p.size * 0.9), 0.5);
                }
                const ring = new THREE.Mesh(
                    ringGeom,
                    new THREE.MeshBasicMaterial({ color: 0xd9c89b, side: THREE.DoubleSide, transparent: true, opacity: 0.75 })
                );
                ring.rotation.x = Math.PI / 2 + 0.4;
                group.add(ring);
            }

            const label = makeLabel(p.name);
            label.position.y = p.size + 2.5;
            group.add(label);
            labels.push(label);

            const orbit = makeOrbitRing(p.distance);
            scene.add(orbit);
            orbitRings.push(orbit);

            scene.add(group);
            planets.push({
                group, mesh, ...p,
                angle: Math.random() * Math.PI * 2,
                spin: 0.5 + Math.random() * 1.5
            });
        });

        // --- Earth's moon, just for charm ---
        const earth = planets[2];
        const moonGroup = new THREE.Group();
        const moon = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 24, 24),
            new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 1 })
        );
        moon.position.x = 3;
        moon.userData.name = 'הירח';
        moonGroup.add(moon);
        earth.group.add(moonGroup);
        earth.moonGroup = moonGroup;

        // --- Interaction: hover tooltip ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const tooltip = document.getElementById('planet-tooltip');
        let pointerInside = false;
        let pointerClientX = 0;
        let pointerClientY = 0;

        function updateHover() {
            if (!pointerInside) {
                tooltip.style.opacity = '0';
                return;
            }
            raycaster.setFromCamera(pointer, camera);
            const targets = [sun, ...planets.map(p => p.mesh), moon];
            const hits = raycaster.intersectObjects(targets, false);
            if (hits.length > 0) {
                const name = hits[0].object === sun ? 'השמש' : hits[0].object.userData.name;
                tooltip.textContent = name;
                tooltip.style.left = pointerClientX + 'px';
                tooltip.style.top = pointerClientY + 'px';
                tooltip.style.opacity = '1';
            } else {
                tooltip.style.opacity = '0';
            }
        }

        renderer.domElement.addEventListener('pointermove', (e) => {
            pointerInside = true;
            pointerClientX = e.clientX;
            pointerClientY = e.clientY;
            pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        renderer.domElement.addEventListener('pointerleave', () => {
            pointerInside = false;
            tooltip.style.opacity = '0';
        });
        window.addEventListener('blur', () => {
            pointerInside = false;
            tooltip.style.opacity = '0';
        });

        // --- UI ---
        const speedSlider = document.getElementById('speed');
        const speedValue = document.getElementById('speed-value');
        const orbitsToggle = document.getElementById('orbits');
        const labelsToggle = document.getElementById('labels');
        const resetBtn = document.getElementById('reset-camera');

        let speedMultiplier = 1;
        speedSlider.addEventListener('input', () => {
            speedMultiplier = parseFloat(speedSlider.value);
            speedValue.textContent = speedMultiplier.toFixed(1) + '×';
        });
        orbitsToggle.addEventListener('change', () => {
            orbitRings.forEach(o => o.visible = orbitsToggle.checked);
        });
        labelsToggle.addEventListener('change', () => {
            labels.forEach(l => l.visible = labelsToggle.checked);
        });
        resetBtn.addEventListener('click', () => {
            camera.position.copy(initialCameraPos);
            controls.target.set(0, 0, 0);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animate ---
        const clock = new THREE.Clock();
        function animate() {
            const dt = clock.getDelta();
            const t = clock.elapsedTime;
            const s = dt * speedMultiplier;

            sun.rotation.y += s * 0.1;
            glow.material.rotation += s * 0.05;
            // subtle pulsing glow
            const pulse = 36 + Math.sin(t * 1.5) * 1.2;
            glow.scale.set(pulse, pulse, 1);

            planets.forEach(p => {
                p.angle += s * p.speed * 0.25;
                p.group.position.x = Math.cos(p.angle) * p.distance;
                p.group.position.z = Math.sin(p.angle) * p.distance;
                p.mesh.rotation.y += s * p.spin;
            });

            // Earth's moon
            if (earth.moonGroup) earth.moonGroup.rotation.y += s * 2.5;

            controls.update();
            updateHover();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
